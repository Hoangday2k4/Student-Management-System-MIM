name: CD — Deploy to Production
 
on:
  push:
    branches: [main]
  workflow_dispatch:   

jobs:
  deploy:
    name: SSH Deploy 
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 2218
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          debug: true
          script: |
            set -euo pipefail
            cd /var/www/html/mimsms
            chmod +x deploy.sh
            ./deploy.sh   
