name: CD — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:   

jobs:
  deploy:
    name: SSH Deploy 
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 118.70.176.240
          username: mimsms
          port: 2218
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          debug: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /var/www/html/mimsms
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy.sh
            ./deploy.sh
            
