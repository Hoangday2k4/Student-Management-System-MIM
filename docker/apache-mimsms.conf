# Apache reverse proxy config for mimsms
# Deploy path: /etc/apache2/sites-available/mimsms.conf
#
# Enable required modules first:
#   sudo a2enmod proxy proxy_http rewrite headers
#   sudo a2ensite mimsms
#   sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName 118.70.176.240

    # Preserve original Host header to Docker containers
    ProxyPreserveHost On

    # ── Frontend (Vue 3) ─────────────────────────────────────────────────────
    # Requests to /mimsms/ are forwarded to Nginx container (port 3000)
    # Apache strips the /mimsms prefix before forwarding
    ProxyPass        /mimsms/ http://127.0.0.1:3000/
    ProxyPassReverse /mimsms/ http://127.0.0.1:3000/

    # ── Backend API ──────────────────────────────────────────────────────────
    # Frontend makes absolute fetch('/api/...') calls.
    # Apache forwards /api/ to the same Nginx container,
    # which then proxies to PHP-FPM (port 9000).
    ProxyPass        /api/ http://127.0.0.1:3000/api/
    ProxyPassReverse /api/ http://127.0.0.1:3000/api/

    # Forward real client IP to backend
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s

    ErrorLog  ${APACHE_LOG_DIR}/mimsms-error.log
    CustomLog ${APACHE_LOG_DIR}/mimsms-access.log combined
</VirtualHost>
